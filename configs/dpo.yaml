model:
  name_or_path: Qwen/Qwen3-8B-Base
  sft_adapter_path: checkpoints/sft
  dtype: bfloat16
  attn_implementation: flash_attention_2

data:
  train_file: data/processed/dpo_train.jsonl
  eval_file: data/processed/dpo_eval.jsonl
  max_prompt_length: 1024
  max_length: 2048

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none

train:
  output_dir: checkpoints/dpo
  beta: 0.1
  loss_type: sigmoid
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.0
  optim: adamw_torch_fused
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 200
  save_total_limit: 3
  report_to: tensorboard
  seed: 42
